experiments:
  deep_model:
    script: train.py
    epochs: 100
    learning_rate: 0.01
    param_set:
      layers: [2, 4]

datasets:
  dataset_override:
    root: /data/override
    experiments:
      - name: deep_model
        output_vars: [target]
        override:
          learning_rate: 0.005
        param_set:
          layers: [6, 8]