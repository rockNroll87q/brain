experiments:
  shared:
    script: shared_train.py
    epochs: 25
    learning_rate: 0.5
    requires_output_var: false

  specialized:
    script: special_train.py
    epochs: 10
    requires_output_var: true

datasets:
  common_set:
    root: /data/common
    experiments:
      - name: shared

  custom_set:
    root: /data/custom
    experiments:
      - name: shared
        param_set:
          learning_rate: [0.1, 0.2]
      - name: specialized
        output_vars: [class1]