experiments:
  finetune:
    script: train.py
    epochs: 20
    learning_rate: 0.0005
    requires_output_var: true
    param_set:
      finetune_depth: [1, 3, 5]

datasets:
  dataset_with_labels:
    root: /data/with_labels
    experiments:
      - name: finetune
        output_vars: [label_a, label_b]